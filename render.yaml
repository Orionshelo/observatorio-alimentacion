services:
  - type: web
    name: observatorio-alimentacion
    runtime: python
    buildCommand: "cd frontend && npm ci && npm run build && cd .. && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
